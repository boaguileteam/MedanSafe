android.useAndroidX=true
android.nonTransitiveRClass=true

# Extreme low-memory configuration
# Using a small heap to ensure the process can at least start
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

kotlin.code.style=official

# 'out-of-process' starts a fresh compiler for each task and exits immediately after.
# This is slower but much more memory-efficient than keeping a daemon alive.
kotlin.compiler.execution.strategy=out-of-process

# Disable background daemons to free up RAM
org.gradle.daemon=false
org.gradle.workers.max=1
org.gradle.parallel=false

# Disable file watching to save memory
org.gradle.vfs.watch=false

systemProp.https.keepAlive=false
